{% extends 'base.html' %} {% block content %}
<div class="container-box">
  <h3>تسجيل الدخول</h3>
  <form method="post">
    <input
      type="text"
      name="username"
      placeholder="اسم المستخدم"
      required
      class="form-control mb-2"
    />
    <input
      type="password"
      name="password"
      placeholder="كلمة المرور"
      required
      class="form-control mb-2"
    />
    <button class="btn btn-primary">تسجيل الدخول</button>
  </form>
  <p class="mt-2">
    ليس لديك حساب؟ <a href="{{ url_for('signup') }}">إنشاء حساب جديد</a>
  </p>
</div>
{% endblock %}
